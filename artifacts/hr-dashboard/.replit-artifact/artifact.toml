kind = "web"
previewPath = "/"
title = "HSS HR Analytics Dashboard"
version = "1.0.0"
id = "artifacts/hr-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18229
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/hr-dashboard run dev"

[services.env]
PORT = "18229"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/hr-dashboard", "run", "build"]
publicDir = "artifacts/hr-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
